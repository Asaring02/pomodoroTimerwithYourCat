<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Friendship Test</title>
  <style>
    progress {
      width: 200px;
      height: 20px;
    }

    progress::-webkit-progress-value {
      background-color: #76c7c0;
    }

    progress::-webkit-progress-bar {
      background-color: #eee;
    }
  </style>
</head>
<body>

  <h2>Friendship System</h2>

  <div id="friendship-container">
    <label for="friendship-bar">Friendship:</label>
    <progress id="friendship-bar" value="0" max="100"></progress>
    <span id="friendship-level">Level: 1</span>
  </div>

  <br>
  <button onclick="increaseFriendship(10)">Use Item (+10)</button>

  <script>
    let friendship = localStorage.getItem("friendship") ? parseInt(localStorage.getItem("friendship")) : 0;
    let friendshipLevel = localStorage.getItem("friendshipLevel") ? parseInt(localStorage.getItem("friendshipLevel")) : 1;
    const MAX_FRIENDSHIP = 100;

    function updateFriendshipUI() {
      const bar = document.getElementById("friendship-bar");
      const levelLabel = document.getElementById("friendship-level");

      if (!bar || !levelLabel) {
        console.error("Friendship UI elements not found!");
        return;
      }

      bar.value = friendship;
      bar.max = MAX_FRIENDSHIP;
      levelLabel.textContent = `Level: ${friendshipLevel}`;
      console.log(`UI updated → value: ${friendship}, level: ${friendshipLevel}`);
    }

    function increaseFriendship(amount = 10) {
      friendship += amount;
      console.log(`Friendship increased by ${amount}, now ${friendship}`);

      while (friendship >= MAX_FRIENDSHIP) {
        friendship -= MAX_FRIENDSHIP;
        friendshipLevel++;
        console.log(`Level Up! Now level ${friendshipLevel}`);
      }

      localStorage.setItem("friendship", friendship);
      localStorage.setItem("friendshipLevel", friendshipLevel);

      updateFriendshipUI();
    }

    window.onload = updateFriendshipUI;
  </script>
</body>
</html>
